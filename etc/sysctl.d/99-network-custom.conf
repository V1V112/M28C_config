# ============================================================
# 1. 核心网络与队列控制
# ============================================================
net.ipv4.tcp_congestion_control = bbr
# 当前已刷入固件如果缺少 sch_fq.ko，设置 fq 会报：
# sysctl: write error: Invalid argument
# 兼容当前固件先使用 fq_codel；重新编译并确认内置 kmod-sched 后，可改为 fq。
net.core.default_qdisc = fq_codel
# net.core.default_qdisc = fq

# ============================================================
# 2. Kernel 基础稳定性 & VM 内存策略 (针对 1GB 设备优化)
# ============================================================
kernel.panic = 3
kernel.sysrq = 0
# M28C / RK3528A 是非 NUMA 设备，部分内核没有此 sysctl，保留会产生启动日志噪声。
# kernel.numa_balancing = 0

vm.swappiness = 10
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.overcommit_memory = 0
vm.panic_on_oom = 0
vm.min_free_kbytes = 32768

fs.file-max = 131072
fs.epoll.max_user_watches = 524288

# ============================================================
# 3. Net Core 缓冲区 (针对 5G / 透明代理 / 1GB 内存的保守兼容值)
# ============================================================
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608
# 不主动抬高默认 socket 缓冲，避免透明代理、多连接和 QUIC 场景放大常驻内存。
# net.core.rmem_default = 262144
# net.core.wmem_default = 262144
net.core.optmem_max = 65535

net.core.netdev_max_backlog = 2048
# 部分 OpenWrt/内核配置会拒绝写入 netdev_budget 或 netdev_budget_usecs。
# 对 RK3528A 四核 A53 来说，保留内核默认值通常比强行拉高更稳。
# net.core.netdev_budget = 400
# net.core.netdev_budget_usecs = 5000
net.core.somaxconn = 4096

# ============================================================
# 4. TCP 协议栈与 BBR V3 / 5G 弱网抗抖动优化
# ============================================================
net.ipv4.tcp_timestamps = 1
# 【新增】激活 BBR V3 的 ECN 拥塞识别能力
net.ipv4.tcp_ecn = 1
net.ipv4.tcp_ecn_fallback = 1
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_adv_win_scale = 1

net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_max_tw_buckets = 16384
net.ipv4.tcp_syn_retries = 4
net.ipv4.tcp_synack_retries = 3
net.ipv4.tcp_max_syn_backlog = 4096

net.ipv4.tcp_rmem = 4096 87380 8388608
net.ipv4.tcp_wmem = 4096 65536 8388608
net.ipv4.tcp_notsent_lowat = 32768
net.ipv4.tcp_max_orphans = 16384
net.ipv4.tcp_orphan_retries = 2

net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# ============================================================
# 5. UDP 与 QUIC / DoQ 专项防爆
# ============================================================
# 【微调】上限压到 128M，防止 1GB 内存设备极端情况下被 QUIC 撑爆
net.ipv4.udp_mem = 8192 16384 32768
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# ============================================================
# 6. TProxy 透明代理与路由
# ============================================================
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.ip_local_port_range = 1024 65535

# ============================================================
# 7. 邻居表
# ============================================================
net.ipv4.neigh.default.gc_stale_time = 120
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096

# ============================================================
# 8. Netfilter / Conntrack
# ============================================================
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_tcp_timeout_established = 1200
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 20
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 180
